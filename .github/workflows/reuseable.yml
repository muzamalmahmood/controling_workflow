name: Reuseable Deploy
on: 
  workflow_call:
    inputs:
      artifact-name:
        description: The name of the Deployable artifts file
        required: false
        default: dist
        type: string
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: GetvCode
        uses: actions/download-artifacts@v4
        with:
          name: ${{ inputs.artifact-name }}
      - name: List Files
        run: ls
      - name: Output information
        run: echo "Deploying & uploading.."