name: Reuseable Deploy

on: 
  workflow_call:
    inputs:
      artifact-name:
        description: The name of the deployable artifacts file
        required: false
        default: dist
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}

      - name: List Files
        run: ls -la

      - name: Output information
        run: echo "Deploying & uploading.." > .github/workflows/execution-flow.txt